name: CI/CD Pipeline

on:
  push:
    branches: [ "main" ]
    paths-ignore:
      - 'infra/build-env/**'

env:
  REGISTRY: ghcr.io

jobs:
  test-rust:
    runs-on: ubuntu-latest
    container:
      image: ghcr.io/${{ github.repository_owner }}/rust-builder:latest
      credentials:
        username: ${{ github.actor }}
        password: ${{ secrets.GITHUB_TOKEN }}

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Rust Cache
        uses: swatinem/rust-cache@v2

      - name: Run Tests
        run: cargo test --workspace --release

  publish-images:
    needs: test-rust
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
    steps:
      - uses: actions/checkout@v4
      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}
      - name: Build and push Gateway
        uses: docker/build-push-action@v6
        with:
          context: .
          file: ./apps/gateway/Dockerfile
          push: true
          tags: ghcr.io/${{ github.repository_owner }}/iot-gateway:latest
      - name: Build and push mosquitto
        uses: docker/build-push-action@v6
        with:
          context: .
          file: ./infra/mosquitto
          push: true
          tags: ghcr.io/${{ github.repository_owner }}/mosquitto-broker:latest
