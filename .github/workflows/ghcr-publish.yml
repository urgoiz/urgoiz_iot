name: CI/CD Pipeline

on:
  push:
    branches: [ "main" ]

jobs:
  # Probamos Rust sin usar contenedores externos para desbloquear la cola
  test-rust:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      
      - name: Install Dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y protobuf-compiler libssl-dev pkg-config
          
      - name: Run Tests
        run: cargo test --workspace

  # Subimos Mosquitto
  publish-mosquitto:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
    steps:
      - uses: actions/checkout@v4
      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}
      - name: Build and push Mosquitto
        uses: docker/build-push-action@v6
        with:
          context: ./infra/mosquitto
          push: true
          tags: ghcr.io/${{ github.repository_owner }}/mosquitto-broker:latest
