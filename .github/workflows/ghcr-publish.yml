name: Publish Infrastructure Images to GHCR

on:
  push:
    branches: [ "main" ]

env:
  REGISTRY: ghcr.io

jobs:
  build-and-push-mosquitto:
    runs-on: ubuntu-latest
    
    permissions:
      contents: read
      packages: write

    steps:
      # v6 ya corre nativamente en Node 24
      - name: Checkout repository
        uses: actions/checkout@v6

      - name: Set lowercase image name
        run: |
          echo "IMAGE_NAME=${GITHUB_REPOSITORY,,}" >> ${GITHUB_ENV}

      # v4 es la versión actual para el login
      - name: Log in to the Container registry
        uses: docker/login-action@v4
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      # v6 para la extracción de metadatos
      - name: Extract metadata (tags, labels) for Docker
        id: meta
        uses: docker/metadata-action@v6
        with:
          images: |
            ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}-broker
          tags: |
            type=sha
            type=raw,value=latest

      # v6 para el build y push
      - name: Build and push Docker image
        uses: docker/build-push-action@v6
        with:
          context: ./infra/mosquitto
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
