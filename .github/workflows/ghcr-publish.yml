name: CI/CD Pipeline

on:
  push:
    branches: [ "main" ]
    paths-ignore:
      - 'infra/build-env/**'

env:
  REGISTRY: ghcr.io

jobs:
  build-rust:
    runs-on: ubuntu-latest
    container:
      image: ghcr.io/${{ github.repository }}/rust-builder:latest
      credentials:
        username: ${{ github.actor }}
        password: ${{ secrets.GITHUB_TOKEN }}

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Rust Cache
        uses: swatinem/rust-cache@v2

      - name: Run Tests
        run: cargo test --workspace --release

      - name: Upload Gateway Binary
        uses: actions/upload-artifact@v4
        with:
          name: gateway-binary
          path: target/release/gateway

  publish-mosquitto:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
    steps:
      - uses: actions/checkout@v4
      
      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}
          
      - name: Build and push Mosquitto
        uses: docker/build-push-action@v6
        with:
          context: ./infra/mosquitto
          push: true
          tags: ghcr.io/${{ github.repository_owner }}/mosquitto-broker:latest
