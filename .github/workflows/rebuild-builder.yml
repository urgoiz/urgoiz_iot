name: Build and Push Custom Builder

on:
  push:
    paths:
      - 'infra/build-env/**'
    branches: [ "main" ]

jobs:
  build-builder:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write

    steps:
      - uses: actions/checkout@v4

      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build and push Builder Image
        uses: docker/build-push-action@v6
        with:
          context: ./infra/build-env
          push: true
          tags: |
            ghcr.io/${{ github.repository }}/rust-builder:latest
