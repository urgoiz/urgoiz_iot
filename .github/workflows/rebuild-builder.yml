name: Build Custom Environment

on:
  push:
    paths:
      - 'infra/build-env/**'
      - 'Cargo.toml'
      - 'Cargo.lock'
    branches: [ "main" ]

jobs:
  build-image:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Login to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build and push
        uses: docker/build-push-action@v6
        with:
          context: .
          file: ./infra/build-env/Dockerfile
          push: true
          tags: ghcr.io/${{ github.repository_owner }}/rust-builder:latest
